<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ChatGPT Download Rescue V3</title>
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 12px;
        min-width: 460px;
      }
      button {
        margin-right: 8px;
        margin-bottom: 8px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        word-break: break-all;
      }
      .log {
        border-top: 1px solid #ddd;
        padding: 8px 0;
      }
      .muted {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div>
      <button id="redownload">Download last direct URL</button>
      <button id="open">Open last direct URL in tab</button>
      <button id="clear">Clear logs</button>
    </div>
    <div id="summary" class="muted"></div>
    <div id="capture" class="mono"></div>
    <div id="logs"></div>
    <script src="popup.js"></script>
  </body>
</html>
